<!-- Declares the document type and HTML5 version -->
<!DOCTYPE html>
<html>
<head>
    <!-- Title displayed in browser tab -->
    <title>Task 4: Countdown Timer</title>

    <!-- =====================
         CSS Styling
    ====================== -->
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        #timer {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
        }

        #message {
            margin-top: 20px;
            font-size: 18px;
            color: green;
        }
    </style>
</head>

<body>

    <h2>Task 4: One Hour Countdown Timer</h2>

    <!-- Timer Display -->
    <div id="timer">60:00</div>

    <!-- Buttons -->
    <button onclick="startTimer()">Start</button>
    <button onclick="pauseTimer()">Pause</button>
    <button onclick="resetTimer()">Reset</button>

    <!-- Message -->
    <div id="message"></div>

    <!-- =====================
         JavaScript Code
    ====================== -->
    <script>
        let totalSeconds = 60 * 60; // 1 hour = 3600 seconds
        let timerInterval = null;

        // Function to update timer display
        function updateTimerDisplay() {
            let minutes = Math.floor(totalSeconds / 60);
            let seconds = totalSeconds % 60;

            // MM:SS format
            document.getElementById("timer").innerText =
                String(minutes).padStart(2, "0") + ":" +
                String(seconds).padStart(2, "0");
        }

        // Start Timer
        function startTimer() {
            if (timerInterval !== null) return; // Prevent multiple intervals

            document.getElementById("message").innerText = "";

            timerInterval = setInterval(() => {
                if (totalSeconds > 0) {
                    totalSeconds--;
                    updateTimerDisplay();
                } else {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    document.getElementById("message").innerText =
                        "⏰ Time is up!";
                }
            }, 1000);
        }

        // Pause Timer
        function pauseTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        // Reset Timer
        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            totalSeconds = 60 * 60;
            updateTimerDisplay();
            document.getElementById("message").innerText = "";
        }

        // Initial display
        updateTimerDisplay();
    </script>

</body>
</html>
